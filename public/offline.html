<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Offline — 888 Market</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        padding: 1.5rem;
        text-align: center;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0;
        color: #94a3b8;
        max-width: 22rem;
        line-height: 1.5;
      }
      a {
        display: inline-block;
        margin-top: 1.25rem;
        color: #38bdf8;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>You are offline</h1>
      <p>Check your connection, then try again. This page is available without a network.</p>
      <a href="/">Back to home</a>
    </div>
  </body>
</html>
